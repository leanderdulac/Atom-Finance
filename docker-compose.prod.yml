version: '3.9'

# ════════════════════════════════════════════════════════════════
#  ATOM — Production Docker Compose
#  Usage: docker-compose -f docker-compose.prod.yml up -d
#
#  Required env vars (set in a .env file or via secrets manager):
#    SECRET_KEY, BRAPI_TOKEN, ANTHROPIC_API_KEY, OPENAI_API_KEY,
#    XAI_API_KEY, PERPLEXITY_API_KEY, POSTGRES_PASSWORD
# ════════════════════════════════════════════════════════════════

services:

  # ── Backend (FastAPI + Uvicorn — production mode) ──────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DATABASE_URL=postgresql+asyncpg://atom:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/atom_db
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=${FRONTEND_URL:-https://atom.yourdomain.com}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://atom.yourdomain.com}
      - BRAPI_TOKEN=${BRAPI_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - BRIDGEWISE_TOKEN=${BRIDGEWISE_TOKEN:-}
      - ACCESS_TOKEN_EXPIRE_HOURS=24
    # No --reload, no mounted source — runs from built image
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Backend NOT exposed directly — only reachable via nginx
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (Nginx serving Vite static build) ─────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE=/api
    restart: unless-stopped
    # Nginx listens on 80 (HTTP) — terminate TLS at load balancer / Cloudflare
    ports:
      - "80:80"
    networks:
      - internal
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: atom_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOT exposed to host — only reachable on internal Docker network
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atom -d atom_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # NOT exposed to host
    expose:
      - "6379"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
