version: '3.9'

# ════════════════════════════════════════════════════════════════
#  ATOM — Production Docker Compose
#  Usage: docker-compose -f docker-compose.prod.yml up -d
#
#  Required env vars (set in a .env file or via secrets manager):
#    SECRET_KEY, BRAPI_TOKEN, ANTHROPIC_API_KEY, OPENAI_API_KEY,
#    XAI_API_KEY, PERPLEXITY_API_KEY, POSTGRES_PASSWORD
# ════════════════════════════════════════════════════════════════

services:

  # ── Backend (FastAPI + Uvicorn — production mode) ──────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ATOM_DB_PATH=/data/atom_reports.db
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=${FRONTEND_URL:-https://atom.yourdomain.com}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://atom.yourdomain.com}
      - BRAPI_TOKEN=${BRAPI_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - BRIDGEWISE_TOKEN=${BRIDGEWISE_TOKEN:-}
      - ACCESS_TOKEN_EXPIRE_HOURS=24
    volumes:
      - sqlite_data:/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
    depends_on:
      - redis
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (Nginx serving Vite static build) ─────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE=/api
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - internal
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis (cache) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  sqlite_data:
  redis_data:
